services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lefteris
      POSTGRES_PASSWORD: lefteris
      POSTGRES_DB: lefteris_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # .env uses localhost for Next.js/Prisma on the host; inside Docker use service names.
      DATABASE_URL: postgresql://lefteris:lefteris@postgres:5432/lefteris_os
      DIRECT_URL: postgresql://lefteris:lefteris@postgres:5432/lefteris_os
      LANGFUSE_HOST: http://langfuse-web:3000
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
