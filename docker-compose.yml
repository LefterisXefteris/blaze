services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lefteris
      POSTGRES_PASSWORD: lefteris
      POSTGRES_DB: lefteris_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
      - api
    command: python worker.py

volumes:
  postgres_data:
  redis_data:
